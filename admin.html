<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Espace propriétaire</title><link rel="stylesheet" href="/style.css"></head><body><nav><div class="logo">⌂ Appartement — Propriétaire</div><a class="navlink" href="/">Page publique</a></nav><main class="container"><div class="card" id="loginBox"><h2>Espace propriétaire</h2><p>Connexion sécurisée côté serveur.</p><label>Mot de passe</label><input id="password" type="password" onkeydown="if(event.key==='Enter') login()"><br><br><button onclick="login()">Se connecter</button></div><div id="dashboard" style="display:none"><div class="card"><h2>Tableau de bord</h2><button class="gold" onclick="loadDashboard()">Rafraîchir</button><button onclick="logout()">Déconnexion</button></div><div class="card"><h2>Réservations confirmées</h2><div id="reservations">Chargement...</div></div><div class="card"><h2>Demandes weekend</h2><div id="weekends">Chargement...</div></div><div class="card"><h2>Configuration</h2><p>Une date par ligne.</p><label>Dates Groupe A</label><textarea id="datesA"></textarea><label>Dates Groupe B</label><textarea id="datesB"></textarea><label>Dates samedi</label><textarea id="datesW"></textarea><div class="grid"><div><label>Début A</label><input id="aStart" type="time"></div><div><label>Fin A</label><input id="aEnd" type="time"></div><div><label>Début B</label><input id="bStart" type="time"></div><div><label>Fin B</label><input id="bEnd" type="time"></div></div><label>Mots-clés Groupe A</label><textarea id="keywordsA"></textarea><label>Mots-clés Groupe B</label><textarea id="keywordsB"></textarea><br><br><button class="gold" onclick="saveConfig()">Sauvegarder</button></div></div></main><script>
async function checkMe(){const r=await fetch('/api/me');const d=await r.json();if(d.admin)showDashboard()}async function login(){const password=document.getElementById('password').value;const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});if(!r.ok){alert('Mot de passe incorrect.');return}showDashboard()}function showDashboard(){document.getElementById('loginBox').style.display='none';document.getElementById('dashboard').style.display='block';loadDashboard();loadConfig()}async function logout(){await fetch('/api/logout',{method:'POST'});location.reload()}async function loadDashboard(){const r=await fetch('/api/admin-reservations');if(r.status===401){location.reload();return}const data=await r.json();renderReservations(data.reservations||[]);renderWeekends(data.weekend_requests||[])}function renderReservations(rows){if(!rows.length){document.getElementById('reservations').innerHTML='<div class="notice">Aucune réservation.</div>';return}document.getElementById('reservations').innerHTML=`<table><thead><tr><th>#</th><th>Date</th><th>Nom</th><th>Téléphone</th><th>Email</th><th>Situation</th><th>Message</th></tr></thead><tbody>`+rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.date_label}<br><b>${r.time}</b></td><td>${r.prenom} ${r.nom}</td><td>${r.tel}</td><td>${r.email}</td><td>${r.situation||''}</td><td>${r.message||''}</td></tr>`).join('')+`</tbody></table>`}function renderWeekends(rows){if(!rows.length){document.getElementById('weekends').innerHTML='<div class="notice">Aucune demande weekend.</div>';return}document.getElementById('weekends').innerHTML=`<table><thead><tr><th>#</th><th>Jour</th><th>Nom</th><th>Téléphone</th><th>Email</th><th>Plage</th><th>Message</th></tr></thead><tbody>`+rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.jour||''}</td><td>${r.nom}</td><td>${r.tel}</td><td>${r.email}</td><td>${r.heure_debut||''} - ${r.heure_fin||''}</td><td>${r.message||''}</td></tr>`).join('')+`</tbody></table>`}async function loadConfig(){const r=await fetch('/api/admin-config');if(!r.ok)return;const c=await r.json();document.getElementById('datesA').value=(c.datesA||[]).join('\n');document.getElementById('datesB').value=(c.datesB||[]).join('\n');document.getElementById('datesW').value=(c.datesW||[]).join('\n');document.getElementById('aStart').value=c.aStart||'09:00';document.getElementById('aEnd').value=c.aEnd||'12:00';document.getElementById('bStart').value=c.bStart||'14:00';document.getElementById('bEnd').value=c.bEnd||'17:00';document.getElementById('keywordsA').value=(c.keywordsA||[]).join('\n');document.getElementById('keywordsB').value=(c.keywordsB||[]).join('\n')}async function saveConfig(){const cfg={datesA:document.getElementById('datesA').value.split('\n').map(x=>x.trim()).filter(Boolean),datesB:document.getElementById('datesB').value.split('\n').map(x=>x.trim()).filter(Boolean),datesW:document.getElementById('datesW').value.split('\n').map(x=>x.trim()).filter(Boolean),weekendActive:true,aStart:document.getElementById('aStart').value,aEnd:document.getElementById('aEnd').value,bStart:document.getElementById('bStart').value,bEnd:document.getElementById('bEnd').value,keywordsA:document.getElementById('keywordsA').value.split('\n').map(x=>x.trim()).filter(Boolean),keywordsB:document.getElementById('keywordsB').value.split('\n').map(x=>x.trim()).filter(Boolean)};const r=await fetch('/api/admin-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});if(!r.ok){alert('Erreur sauvegarde.');return}alert('Configuration sauvegardée.')}checkMe();</script></body></html>
